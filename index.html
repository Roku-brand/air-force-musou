<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>空軍無双</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <canvas id="game-canvas" aria-label="3D空戦シミュレーション"></canvas>

    <div class="hud hidden" id="hud">
      <div class="hud-top">
        <div class="status-strip hud-block">
          <div class="status-item">
            <span class="label">耐久</span>
            <strong class="status-value" id="health-text">3 / 3</strong>
          </div>
          <div class="status-item">
            <span class="label">ミサイル</span>
            <strong class="status-value" id="ammo-text">20 / 20</strong>
          </div>
        </div>
        <div class="hud-block hud-block-compact">
          <div class="label">任務</div>
          <div class="value" id="mission-name">-</div>
          <div class="sub" id="mission-objective">-</div>
        </div>
        <div class="hud-block hud-block-right">
          <div class="label">ロックオン</div>
          <div class="value" id="lock-name">ロックなし</div>
          <div class="sub" id="lock-distance">---</div>
        </div>
      </div>

      <div class="hud-center">
        <div class="crosshair">
          <span class="crosshair-ring"></span>
          <span class="crosshair-dot"></span>
        </div>
        <div class="hit-flash" id="hit-flash"></div>
      </div>

      <div class="hud-bottom">
        <div class="radar-panel">
          <div class="radar-title">戦術レーダー</div>
          <canvas id="radar-canvas" width="180" height="180"></canvas>
        </div>

        <div class="telemetry-panel">
          <div class="telemetry-row"><span>速度</span><strong id="speed-text">0</strong></div>
          <div class="telemetry-row"><span>高度</span><strong id="altitude-text">0</strong></div>
          <div class="telemetry-row"><span>敵影</span><strong id="hostiles-text">0</strong></div>
          <div class="telemetry-row"><span>進行</span><strong id="stage-text">1 / 3</strong></div>
        </div>
      </div>

      <div class="touch-controls" id="touch-controls" aria-hidden="true">
        <div class="touch-stick" id="touch-stick-flight">
          <div class="touch-stick-label">操縦</div>
          <div class="touch-stick-knob"></div>
        </div>

        <div class="touch-action-cluster">
          <button class="touch-button touch-button-speed" data-key="ShiftLeft">速度</button>
          <button class="touch-button touch-button-fire" data-fire="true">射撃</button>
        </div>
      </div>
    </div>

    <div class="overlay overlay-visible" id="menu-overlay">
      <div class="panel hero-panel">
        <div class="eyebrow">三次元 空戦シミュレーション</div>
        <h1>空軍無双</h1>
        <p class="lead">ステージを選択して出撃してください。</p>

        <div class="stage-cards" id="stage-cards"></div>

        <div class="button-row">
          <button class="action-button" id="start-button">作戦開始</button>
        </div>
      </div>
    </div>

    <div class="ui-tabs">
      <button class="ui-tab-button" id="tab-help" type="button">操作方法</button>
      <button class="ui-tab-button" id="tab-menu" type="button">ステージ選択</button>
    </div>

    <div class="panel help-panel hidden" id="help-panel">
      <h3>操作方法</h3>
      <div class="controls-grid">
        <div><span>↑ ↓ ← →</span>操縦（機体の進行）</div>
        <div><span>Shift</span>速度（長押しで加速）</div>
        <div><span>Space</span>射撃</div>
        <div><span>R / Esc</span>再出撃 / メニュー</div>
        <div><span>左スティック</span>操縦（上下左右）</div>
        <div><span>右ボタン(速度)</span>長押しで加速</div>
        <div><span>右ボタン(射撃)</span>ミサイル発射</div>
      </div>
    </div>

    <div class="orientation-lock" id="orientation-lock">スマホは横画面でプレイしてください</div>

    <div class="overlay" id="message-overlay">
      <div class="panel message-panel">
        <div class="eyebrow" id="message-eyebrow">状況更新</div>
        <h2 id="message-title">出撃準備完了</h2>
        <p id="message-body">-</p>
        <div class="button-row">
          <button class="action-button" id="message-primary">続行</button>
          <button class="ghost-button" id="message-secondary">ステージ選択</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./src/config.js"></script>
  <script src="./src/math.js"></script>
  <script src="./src/entities.js"></script>
  <script src="./src/render.js"></script>
  <script src="./src/game.js"></script>
</body>
</html>
